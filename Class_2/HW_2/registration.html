<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HomeWork 2</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!--logo-banner start-->
    <section>
      <div class="row">
        <div class="col-2 h-100">
          <img
            src="images/duet-logo.png"
            alt="duet-logo"
            width="50px"
            height="50px"
            style="margin-top: 20px"
          />
        </div>
        <div class="col-10 h-100">
          <h2>Dhaka University of Engineering and Technology (DUET)</h2>
        </div>
      </div>
    </section>
    <!--logo-banner end-->

    <!--Menu start-->
    <section>
      <div class="row">
        <div class="col-12 h-50">
          <a href="index.html">Home</a>|
          <a href="registration.html">Registration</a>| <a href="#">Login</a>|
          <a href="#">About</a>
        </div>
      </div>
    </section>
    <!--Menu End-->

    <!--Registration Form start-->
    <section>
      <div>
        <form action="#" class="h-600">
          <h2>Registration Form</h2>
          <hr />
          <label for="name">Name:</label>
          <input type="text" name="name" required />

          <br />
          <label for="email">Email:</label>
          <input type="email" name="email" required />

          <br />
          <label for="gender">Gender:</label>
          <input type="radio" name="gender" value="Male" required />Male
          <input type="radio" name="gender" value="Female" required />Female
          <input type="radio" name="gender" value="Others" required />Others

          <br />
          <label for="dob">Date of Birth:</label>
          <input type="date" name="dob" required />

          <br />
          <label for="password">Password:</label>
          <input type="password" name="password" required />

          <br />
          <input type="submit" placeholder="Submit" />
        </form>
      </div>
    </section>
    <!--Registration Form End-->

    <!--Footer start-->
    <section>
      <div class="row">
        <div class="col-12 h-50 footer">
          <p>Footer &copy; Copyright.</p>
        </div>
      </div>
    </section>
    <!--Footer End-->
  </body>
</html>
